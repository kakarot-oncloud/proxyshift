<svg xmlns="http://www.w3.org/2000/svg" width="740" height="420" viewBox="0 0 740 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d18;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <clipPath id="popup-clip">
      <rect x="0" y="0" width="360" height="400" rx="10" ry="10"/>
    </clipPath>
    <clipPath id="popup2-clip">
      <rect x="0" y="0" width="360" height="400" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="740" height="420" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="60" x2="740" y2="60"/>
    <line x1="0" y1="120" x2="740" y2="120"/>
    <line x1="0" y1="180" x2="740" y2="180"/>
    <line x1="0" y1="240" x2="740" y2="240"/>
    <line x1="0" y1="300" x2="740" y2="300"/>
    <line x1="0" y1="360" x2="740" y2="360"/>
    <line x1="60" y1="0" x2="60" y2="420"/>
    <line x1="160" y1="0" x2="160" y2="420"/>
    <line x1="260" y1="0" x2="260" y2="420"/>
    <line x1="360" y1="0" x2="360" y2="420"/>
    <line x1="460" y1="0" x2="460" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/>
    <line x1="660" y1="0" x2="660" y2="420"/>
  </g>

  <!-- Accent glow circles -->
  <circle cx="190" cy="210" r="120" fill="#6366f1" opacity="0.04"/>
  <circle cx="550" cy="210" r="120" fill="#6366f1" opacity="0.04"/>

  <!-- === LEFT POPUP: Dark theme with active proxy === -->
  <g transform="translate(30, 10)" filter="url(#shadow)">
    <g clip-path="url(#popup-clip)">
      <!-- Popup background -->
      <rect x="0" y="0" width="360" height="400" rx="10" fill="#0d1117"/>

      <!-- Header -->
      <rect x="0" y="0" width="360" height="48" fill="#161b22"/>
      <rect x="0" y="47" width="360" height="1" fill="#30363d"/>

      <!-- Logo icon (shield) -->
      <g transform="translate(14, 13)">
        <path d="M11 1L3 5v4c0 4.55 3.25 8.8 8 9.93C16.75 17.8 20 13.55 20 9V5L11 1z" fill="#6366f1" opacity="0.2"/>
        <path d="M11 1L3 5v4c0 4.55 3.25 8.8 8 9.93C16.75 17.8 20 13.55 20 9V5L11 1z" stroke="#6366f1" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <circle cx="11" cy="10" r="2.5" fill="#6366f1"/>
      </g>
      <text x="42" y="29" font-size="14" font-weight="600" fill="#e6edf3" letter-spacing="0.2">ProxyShift</text>

      <!-- Toggle ON -->
      <rect x="270" y="15" width="44" height="20" rx="10" fill="#6366f1"/>
      <circle cx="304" cy="25" r="8" fill="white"/>
      <text x="320" y="29" font-size="11" font-weight="600" fill="#3fb950">ON</text>

      <!-- Settings gear -->
      <circle cx="345" cy="25" r="10" fill="#1c2230"/>
      <text x="341" y="29" font-size="12" fill="#8b949e">⚙</text>

      <!-- Status bar (active) -->
      <rect x="0" y="48" width="360" height="34" fill="#1c2230"/>
      <circle cx="16" cy="65" r="5" fill="#3fb950"/>
      <circle cx="16" cy="65" r="5" fill="#3fb950" opacity="0.4">
        <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="27" y="69" font-size="11.5" fill="#e6edf3">185.220.101.34 — Germany · Frankfurt</text>
      <!-- Refresh icon -->
      <text x="335" y="70" font-size="13" fill="#8b949e">↻</text>
      <rect x="0" y="81" width="360" height="1" fill="#30363d"/>

      <!-- Section header -->
      <text x="14" y="104" font-size="11" font-weight="600" fill="#8b949e" letter-spacing="0.5">PROXY PROFILES</text>
      <!-- Add button -->
      <rect x="308" y="90" width="40" height="22" rx="5" fill="#1c2230" stroke="#30363d" stroke-width="1"/>
      <text x="318" y="105" font-size="11" fill="#8b949e">+ Add</text>

      <!-- Profile 1 — Active -->
      <rect x="10" y="116" width="340" height="56" rx="7" fill="#1c2230"/>
      <rect x="10" y="116" width="340" height="56" rx="7" stroke="#6366f1" stroke-width="1.5" fill="none"/>
      <!-- Active dot -->
      <circle cx="26" cy="144" r="5" fill="#3fb950"/>
      <text x="36" y="140" font-size="12.5" font-weight="600" fill="#e6edf3">DE Residential</text>
      <rect x="36" y="147" width="38" height="14" rx="4" fill="#a78bfa" opacity="0.2"/>
      <text x="40" y="158" font-size="10" fill="#a78bfa" font-weight="500">SOCKS5</text>
      <text x="80" y="158" font-size="10" fill="#8b949e">proxy.de-node1.net:1080</text>
      <!-- Edit/Delete icons -->
      <text x="308" y="140" font-size="12" fill="#484f58">✎</text>
      <text x="330" y="140" font-size="12" fill="#484f58">✕</text>

      <!-- Profile 2 -->
      <rect x="10" y="178" width="340" height="56" rx="7" fill="#161b22"/>
      <circle cx="26" cy="206" r="5" fill="#30363d"/>
      <text x="36" y="202" font-size="12.5" font-weight="600" fill="#e6edf3">US DataCenter</text>
      <rect x="36" y="209" width="30" height="14" rx="4" fill="#3b82f6" opacity="0.2"/>
      <text x="40" y="220" font-size="10" fill="#3b82f6" font-weight="500">HTTP</text>
      <text x="73" y="220" font-size="10" fill="#8b949e">us1.fastproxy.io:8080</text>
      <text x="308" y="202" font-size="12" fill="#484f58">✎</text>
      <text x="330" y="202" font-size="12" fill="#484f58">✕</text>

      <!-- Profile 3 -->
      <rect x="10" y="240" width="340" height="56" rx="7" fill="#161b22"/>
      <circle cx="26" cy="268" r="5" fill="#30363d"/>
      <text x="36" y="264" font-size="12.5" font-weight="600" fill="#e6edf3">JP Premium</text>
      <rect x="36" y="271" width="38" height="14" rx="4" fill="#22c55e" opacity="0.2"/>
      <text x="40" y="282" font-size="10" fill="#22c55e" font-weight="500">HTTPS</text>
      <text x="81" y="282" font-size="10" fill="#8b949e">jp-proxy.anon.jp:443</text>
      <text x="308" y="264" font-size="12" fill="#484f58">✎</text>
      <text x="330" y="264" font-size="12" fill="#484f58">✕</text>

      <!-- Import/Export row -->
      <rect x="10" y="305" width="163" height="28" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="54" y="323" font-size="11" fill="#8b949e">⬆ Import</text>
      <rect x="187" y="305" width="163" height="28" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="230" y="323" font-size="11" fill="#8b949e">⬇ Export</text>

      <!-- Footer -->
      <rect x="0" y="367" width="360" height="1" fill="#30363d"/>
      <rect x="0" y="368" width="360" height="32" fill="#161b22"/>
      <text x="14" y="388" font-size="10.5" fill="#484f58">📍</text>
      <text x="26" y="388" font-size="10.5" fill="#8b949e">185.220.101.34</text>
      <text x="310" y="388" font-size="10.5" fill="#8b949e">Options</text>
    </g>
    <!-- Popup border -->
    <rect x="0" y="0" width="360" height="400" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>
  </g>

  <!-- Label: Dark Theme -->
  <text x="210" y="415" text-anchor="middle" font-size="11" fill="#484f58" letter-spacing="0.5">DARK THEME — ACTIVE PROXY</text>

  <!-- === RIGHT POPUP: Light theme with Settings modal === -->
  <g transform="translate(350, 10)" filter="url(#shadow)">
    <g clip-path="url(#popup2-clip)">
      <!-- Popup background -->
      <rect x="0" y="0" width="360" height="400" rx="10" fill="#f6f8fa"/>

      <!-- Dim overlay for modal -->
      <rect x="0" y="0" width="360" height="400" rx="10" fill="#1f2328" opacity="0.5"/>

      <!-- Header -->
      <rect x="0" y="0" width="360" height="48" fill="#ffffff"/>
      <rect x="0" y="47" width="360" height="1" fill="#d0d7de"/>
      <g transform="translate(14, 13)">
        <path d="M11 1L3 5v4c0 4.55 3.25 8.8 8 9.93C16.75 17.8 20 13.55 20 9V5L11 1z" fill="#5b21b6" opacity="0.2"/>
        <path d="M11 1L3 5v4c0 4.55 3.25 8.8 8 9.93C16.75 17.8 20 13.55 20 9V5L11 1z" stroke="#5b21b6" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <circle cx="11" cy="10" r="2.5" fill="#5b21b6"/>
      </g>
      <text x="42" y="29" font-size="14" font-weight="600" fill="#1f2328" letter-spacing="0.2">ProxyShift</text>

      <!-- Modal: Add Proxy -->
      <rect x="20" y="60" width="320" height="310" rx="10" fill="#ffffff" filter="url(#shadow)"/>
      <rect x="20" y="60" width="320" height="310" rx="10" stroke="#d0d7de" stroke-width="1" fill="none"/>

      <!-- Modal header -->
      <rect x="20" y="60" width="320" height="48" rx="10" fill="#f6f8fa"/>
      <rect x="20" y="96" width="320" height="1" fill="#d0d7de"/>
      <rect x="20" y="60" width="320" height="18" rx="0" fill="#f6f8fa"/>
      <rect x="20" y="78" width="320" height="18" rx="0" fill="#f6f8fa"/>
      <text x="36" y="90" font-size="13" font-weight="600" fill="#1f2328">Add Proxy</text>
      <text x="320" y="90" font-size="16" fill="#57606a">✕</text>

      <!-- Name field -->
      <text x="36" y="118" font-size="11" font-weight="500" fill="#57606a">Name</text>
      <rect x="36" y="123" width="288" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
      <text x="48" y="142" font-size="11.5" fill="#1f2328">US Residential — Bright Data</text>

      <!-- Type / Host / Port row -->
      <text x="36" y="167" font-size="11" font-weight="500" fill="#57606a">Type</text>
      <rect x="36" y="172" width="60" height="30" rx="6" fill="#f6f8fa" stroke="#5b21b6" stroke-width="1.5"/>
      <text x="48" y="191" font-size="11.5" fill="#1f2328">SOCKS5</text>

      <text x="106" y="167" font-size="11" font-weight="500" fill="#57606a">Host / IP</text>
      <rect x="106" y="172" width="170" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
      <text x="116" y="191" font-size="11.5" fill="#1f2328">brd.superproxy.io</text>

      <text x="286" y="167" font-size="11" font-weight="500" fill="#57606a">Port</text>
      <rect x="286" y="172" width="62" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
      <text x="296" y="191" font-size="11.5" fill="#1f2328">22225</text>

      <!-- Divider -->
      <line x1="36" y1="215" x2="324" y2="215" stroke="#d0d7de" stroke-width="1"/>
      <rect x="100" y="208" width="160" height="14" rx="0" fill="white"/>
      <text x="130" y="219" font-size="10" fill="#9198a1">Authentication (optional)</text>

      <!-- Username / Password -->
      <text x="36" y="238" font-size="11" font-weight="500" fill="#57606a">Username</text>
      <rect x="36" y="243" width="135" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
      <text x="48" y="262" font-size="11.5" fill="#1f2328">brd-customer-xxx</text>

      <text x="183" y="238" font-size="11" font-weight="500" fill="#57606a">Password</text>
      <rect x="183" y="243" width="141" height="30" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
      <text x="195" y="262" font-size="14" fill="#57606a" letter-spacing="3">••••••••</text>

      <!-- Modal footer buttons -->
      <rect x="36" y="290" width="60" height="30" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
      <text x="53" y="309" font-size="11" fill="#57606a">Cancel</text>

      <rect x="108" y="290" width="60" height="30" rx="6" fill="white" stroke="#d0d7de" stroke-width="1"/>
      <text x="122" y="309" font-size="11" fill="#1a7f37" font-weight="500">✓ Test</text>

      <rect x="248" y="290" width="100" height="30" rx="6" fill="#5b21b6"/>
      <text x="282" y="309" font-size="11.5" fill="white" font-weight="600">Save</text>
    </g>
    <!-- Popup border -->
    <rect x="0" y="0" width="360" height="400" rx="10" fill="none" stroke="#d0d7de" stroke-width="1"/>
  </g>

  <!-- Label: Light Theme -->
  <text x="530" y="415" text-anchor="middle" font-size="11" fill="#484f58" letter-spacing="0.5">LIGHT THEME — ADD PROXY DIALOG</text>
</svg>
